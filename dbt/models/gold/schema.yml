version: 2

models:
  - name: fact_orders
    description: "Central fact table — one row per order with financial, delivery and review metrics"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Foreign key to dim_customers"
        tests:
          - not_null
      - name: order_date
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
      - name: total_order_value
        tests:
          - not_null

  - name: dim_customers
    description: "Customer dimension with lifetime metrics and segmentation"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - not_null
          - unique
      - name: customer_state
        tests:
          - not_null
      - name: customer_segment
        tests:
          - not_null
          - accepted_values:
              values: ["one_time", "occasional", "loyal"]

  - name: dim_products
    description: "Product dimension with English category names and volume"
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: product_category
        tests:
          - not_null

  - name: dim_sellers
    description: "Seller dimension with revenue metrics and tier classification"
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique
      - name: seller_tier
        tests:
          - not_null
          - accepted_values:
              values: ["platinum", "gold", "silver", "bronze"]

  - name: dim_dates
    description: "Date dimension covering 2016 to 2019"
    columns:
      - name: date_id
        tests:
          - not_null
          - unique
      - name: year
        tests:
          - not_null
